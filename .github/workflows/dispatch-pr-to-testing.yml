name: Dispatch PR to testing framework

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - autokraft

      
permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch PR details to testing repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.UK_TESTING_REPO_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const repo = context.payload.repository;

            const payload = {
              source_repo: repo.full_name,
              source_repo_clone_url: repo.clone_url,
              pr_number: pr.number,
              pr_url: pr.html_url,
              pr_title: pr.title,
              pr_body: pr.body || '',
              pr_head_ref: pr.head.ref,
              pr_head_sha: pr.head.sha,
              pr_head_repo_full_name: pr.head.repo.full_name,
              pr_head_repo_clone_url: pr.head.repo.clone_url,
              pr_is_fork: pr.head.repo.full_name !== repo.full_name,
              pr_base_ref: pr.base.ref,
              pr_base_repo_full_name: pr.base.repo.full_name,
              pr_base_repo_clone_url: pr.base.repo.clone_url,
              sender_login: context.actor,
              action: context.payload.action,
              timestamp: new Date().toISOString()
            };

            const owner = process.env.TARGET_REPO_OWNER || repo.owner.login;
            const repoName = process.env.TARGET_REPO_NAME || 'testing-fw-uk-build';

            core.info(`Dispatching to ${owner}/${repoName} with event_type 'uk_pr_test'...`);
            await github.request('POST /repos/{owner}/{repo}/dispatches', {
              owner,
              repo: repoName,
              event_type: 'uk_pr_test',
              client_payload: payload
            });
            core.notice(`Repository dispatch sent to ${owner}/${repoName} for PR #${pr.number}`);
        env:
          # Optionally override the target repo owner/name via repo variables
          TARGET_REPO_OWNER: ${{ vars.TARGET_REPO_OWNER }}
          TARGET_REPO_NAME: ${{ vars.TARGET_REPO_NAME }}
